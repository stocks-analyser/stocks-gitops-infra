apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-db
  namespace: argocd
spec:
  source:
    helm:
      values: |
        global:
          postgresql:
            postgresqlPassword: abc
            postgresqlUsername: def
            postgresqlDatabase: stcks
        primary:
          persistence:
            enabled: true
        primary:
          initdb:
            user: stocks-user
        stocksDB:
          username: user2
          database: stocks-db
    