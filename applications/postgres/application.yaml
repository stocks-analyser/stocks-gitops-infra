apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-db
  namespace: argocd

  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: 15.5.0
    helm:
      releaseName: postgres-db
      values: |
        global:
          postgresql:
            postgresqlPassword: abc
            postgresqlUsername: def
            postgresqlDatabase: stcks
        primary:
          persistence:
            enabled: true
        primary:
          initdb:
            user: stocks-user
        stocksDB:
          username: user2
          database: stocks-db
      

 

  destination:
    server: https://kubernetes.default.svc
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
